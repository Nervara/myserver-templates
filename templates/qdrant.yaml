key: qdrant
name: Qdrant
description: High-performance vector similarity search engine for AI applications.
category: search
icon_url: https://qdrant.tech/favicon/favicon.ico
default_image: qdrant/qdrant:latest
volumes:
  - data:/qdrant/storage
exposed_ports:
  - "6333"
  - "6334"
author: serverops
version: "1.0.0"
compose_template: |
  services:
    {{.Name}}:
      image: {{.Image}}
      volumes:
        - data:/qdrant/storage
      expose:
        - "6333"
        - "6334"
      labels:
        com.myserver.service-uuid: "{{.UUID}}"
      networks:
        - myserver
      restart: unless-stopped

  volumes:
    data:

  networks:
    myserver:
      external: true
